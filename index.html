<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>旅遊購物清單</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --navy: #1a2744;
    --navy-light: #253357;
    --blue: #4a90d9;
    --blue-light: #e8f2fc;
    --bought-bg: #4a90d9;
    --text: #1a2744;
    --text-muted: #7a8499;
    --border: #e8ebf0;
    --card-bg: #ffffff;
    --bg: #f4f6fa;
    --radius: 16px;
    --radius-sm: 10px;
  }
  body {
    font-family: -apple-system, 'PingFang TC', 'Noto Sans TC', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    color: var(--text);
  }

  /* HEADER */
  .app-header {
    background: var(--navy);
    color: white;
    padding: 20px 20px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header h1 {
    font-size: 22px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .app-header p {
    font-size: 13px;
    opacity: 0.6;
    margin-top: 4px;
  }

  /* STORE LIST */
  #home-view { padding: 16px; }
  .store-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.18s;
    position: relative;
  }
  .store-card:active { transform: scale(0.98); }
  .store-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .store-info { flex: 1; min-width: 0; }
  .store-name { font-size: 16px; font-weight: 600; }
  .store-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .store-progress {
    text-align: right;
    flex-shrink: 0;
  }
  .store-count {
    font-size: 15px;
    font-weight: 700;
  }
  .store-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .store-actions {
    display: flex; gap: 6px; margin-left: 4px;
  }
  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: none;
    background: var(--bg);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    color: var(--text-muted);
    transition: background 0.15s;
  }
  .icon-btn:active { background: var(--border); }

  .add-store-btn {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 18px;
    text-align: center;
    color: var(--text-muted);
    font-size: 15px;
    cursor: pointer;
    margin-top: 4px;
    transition: all 0.18s;
    background: none;
    width: 100%;
  }
  .add-store-btn:active { background: var(--border); }

  /* STORE DETAIL */
  #detail-view { display: none; }
  .detail-header {
    background: var(--navy);
    color: white;
    padding: 16px 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .detail-header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .back-btn {
    background: none; border: none;
    color: white; font-size: 22px;
    cursor: pointer; padding: 4px;
    line-height: 1;
  }
  .detail-title { font-size: 18px; font-weight: 700; flex: 1; }
  .detail-sub { font-size: 12px; opacity: 0.6; margin-left: 40px; }
  .detail-header-actions {
    display: flex; gap: 8px; align-items: center;
    margin-left: auto;
  }
  .header-btn {
    background: rgba(255,255,255,0.15);
    border: none; color: white;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; gap: 4px;
  }
  .header-btn:active { background: rgba(255,255,255,0.25); }

  /* ITEMS GRID */
  .items-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 14px;
  }
  .item-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    overflow: hidden;
    border: 2px solid transparent;
    transition: all 0.18s;
    position: relative;
  }
  .item-card.bought {
    border-color: var(--blue);
  }
  .item-img-wrap {
    width: 100%;
    aspect-ratio: 1;
    background: #eef0f5;
    position: relative;
    overflow: hidden;
  }
  .item-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .item-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: #ccc; font-size: 36px;
  }
  .bought-overlay {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 44px; height: 44px;
    background: var(--blue);
    border-radius: 50%;
    display: none;
    align-items: center; justify-content: center;
    color: white; font-size: 22px;
    font-weight: 700;
  }
  .item-card.bought .bought-overlay { display: flex; }
  .item-edit-btns {
    position: absolute;
    top: 6px; right: 6px;
    display: flex; gap: 4px;
  }
  .item-edit-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    background: rgba(255,255,255,0.85);
    color: #555;
  }
  .item-body { padding: 10px 10px 12px; }
  .item-name {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 4px;
    word-break: break-all;
  }
  .item-price {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .buy-btn {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }
  .item-card.bought .buy-btn {
    background: var(--blue);
    border-color: var(--blue);
    color: white;
  }
  .add-item-card {
    background: white;
    border-radius: var(--radius);
    border: 2px dashed var(--border);
    aspect-ratio: auto;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 28px;
    gap: 6px;
    transition: all 0.15s;
  }
  .add-item-card span { font-size: 13px; }
  .add-item-card:active { background: var(--bg); }

  /* MODAL */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 36px;
    width: 100%;
    max-width: 480px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 16px;
    text-align: center;
  }
  .modal label {
    font-size: 13px;
    color: var(--text-muted);
    display: block;
    margin-bottom: 4px;
    margin-top: 12px;
  }
  .modal input[type=text],
  .modal input[type=number],
  .modal select {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: white;
    outline: none;
  }
  .modal input:focus { border-color: var(--blue); }
  .img-upload-area {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    color: var(--text-muted);
    cursor: pointer;
    margin-top: 4px;
    font-size: 14px;
    transition: all 0.15s;
  }
  .img-upload-area:active { background: var(--bg); }
  .img-preview {
    width: 100%; aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
    margin-top: 4px;
    display: none;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    flex: 1; padding: 13px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: white;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-confirm {
    flex: 2; padding: 13px;
    border: none;
    border-radius: 10px;
    background: var(--navy);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-confirm:active { background: var(--navy-light); }
  .icon-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    margin-top: 4px;
  }
  .icon-opt {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 2px solid transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    cursor: pointer;
    background: var(--bg);
    transition: all 0.12s;
  }
  .icon-opt.selected { border-color: var(--blue); background: var(--blue-light); }
  .color-grid {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px;
  }
  .color-opt {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.12s;
  }
  .color-opt.selected { border-color: #333; transform: scale(1.15); }

  input[type=file] { display: none; }
  .progress-bar-wrap {
    height: 4px; background: rgba(255,255,255,0.2);
    border-radius: 2px; margin-top: 8px; margin-left: 40px;
  }
  .progress-bar { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.3s; }
</style>
</head>
<body>

<!-- HOME VIEW -->
<div id="home-view">
  <div class="app-header">
    <h1>✈️ 旅遊購物清單</h1>
    <p>選擇商店，查看並勾選購物清單</p>
  </div>
  <div style="padding: 16px;" id="store-list"></div>
  <div style="padding: 0 16px 32px;">
    <button class="add-store-btn" onclick="openAddStore()">＋ 新增商店</button>
  </div>
</div>

<!-- DETAIL VIEW -->
<div id="detail-view">
  <div class="detail-header">
    <div class="detail-header-top">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="detail-title" id="detail-title">商店名稱</div>
      <div class="detail-header-actions">
        <button class="header-btn" id="rename-btn" onclick="renameStore()">✏️ 店名</button>
        <button class="header-btn" onclick="resetStore()">重置</button>
      </div>
    </div>
    <div class="detail-sub" id="detail-sub"></div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
  </div>
  <div class="items-grid" id="items-grid"></div>
</div>

<!-- MODAL: Add Store -->
<div class="modal-bg" id="modal-store">
  <div class="modal">
    <div class="modal-title" id="modal-store-title">新增商店</div>
    <label>商店名稱</label>
    <input type="text" id="store-name-inp" placeholder="例：MUJI 用品" />
    <label>英文/副標題（選填）</label>
    <input type="text" id="store-sub-inp" placeholder="例：MUJI-Supplies" />
    <label>選擇圖示</label>
    <div class="icon-grid" id="icon-grid"></div>
    <label>選擇顏色</label>
    <div class="color-grid" id="color-grid"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-store')">取消</button>
      <button class="btn-confirm" onclick="saveStore()">儲存</button>
    </div>
  </div>
</div>

<!-- MODAL: Add Item -->
<div class="modal-bg" id="modal-item">
  <div class="modal">
    <div class="modal-title">新增品項</div>
    <div class="img-upload-area" onclick="document.getElementById('img-inp').click()">
      📷 點此上傳商品照片
      <input type="file" id="img-inp" accept="image/*" onchange="handleImg(event)">
    </div>
    <img class="img-preview" id="img-preview" alt="預覽">
    <label>品項名稱</label>
    <input type="text" id="item-name-inp" placeholder="例：可摺疊收納袋/雙層/M" />
    <label>金額（選填）</label>
    <input type="number" id="item-price-inp" placeholder="例：4990日圓" />
    <label>幣別</label>
    <select id="item-currency-inp">
      <option value="日圓">日圓 (¥)</option>
      <option value="台幣">台幣 (NT$)</option>
      <option value="韓圜">韓圜 (₩)</option>
      <option value="美元">美元 ($)</option>
      <option value="歐元">歐元 (€)</option>
      <option value="港幣">港幣 (HK$)</option>
    </select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-item')">取消</button>
      <button class="btn-confirm" onclick="saveItem()">新增</button>
    </div>
  </div>
</div>

<!-- MODAL: Rename Store -->
<div class="modal-bg" id="modal-rename">
  <div class="modal">
    <div class="modal-title">重新命名</div>
    <label>商店名稱</label>
    <input type="text" id="rename-name-inp" />
    <label>英文/副標題（選填）</label>
    <input type="text" id="rename-sub-inp" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-rename')">取消</button>
      <button class="btn-confirm" onclick="doRename()">確定</button>
    </div>
  </div>
</div>

<!-- MODAL: Edit Item -->
<div class="modal-bg" id="modal-edit-item">
  <div class="modal">
    <div class="modal-title">編輯品項</div>
    <div class="img-upload-area" onclick="document.getElementById('edit-img-inp').click()">
      📷 點此更換照片
      <input type="file" id="edit-img-inp" accept="image/*" onchange="handleEditImg(event)">
    </div>
    <img class="img-preview" id="edit-img-preview" alt="預覽">
    <label>品項名稱</label>
    <input type="text" id="edit-item-name-inp" />
    <label>金額（選填）</label>
    <input type="number" id="edit-item-price-inp" />
    <label>幣別</label>
    <select id="edit-item-currency-inp">
      <option value="日圓">日圓 (¥)</option>
      <option value="台幣">台幣 (NT$)</option>
      <option value="韓圜">韓圜 (₩)</option>
      <option value="美元">美元 ($)</option>
      <option value="歐元">歐元 (€)</option>
      <option value="港幣">港幣 (HK$)</option>
    </select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-edit-item')">取消</button>
      <button class="btn-confirm" onclick="saveEditItem()">儲存</button>
    </div>
  </div>
</div>

<script>
const ICONS = ['📦','🛒','💊','🍬','👗','👟','🧴','🍱','🎁','📚','🧸','💄','🥢','🍜','🧪','🍰','🎮','🏠'];
const COLORS = ['#e8f0f8','#fff3e0','#e8f5e9','#fce4ec','#f3e5f5','#e0f7fa','#fff8e1','#fbe9e7','#ede7f6','#e8eaf6','#f1f8e9','#e0f2f1'];
const COLOR_ICONS = { '#e8f0f8':'📦','#fff3e0':'🍬','#e8f5e9':'🌿','#fce4ec':'💗','#f3e5f5':'💜','#e0f7fa':'💧','#fff8e1':'⭐','#fbe9e7':'🔸','#ede7f6':'🌸','#e8eaf6':'🔷','#f1f8e9':'🌱','#e0f2f1':'🌊' };

let stores = JSON.parse(localStorage.getItem('travel_stores') || '[]');
let currentStoreId = null;
let editingStoreId = null;
let editingItemId = null;
let selectedIcon = ICONS[0];
let selectedColor = COLORS[0];
let newItemImg = null;
let editItemImg = null;

function save() { localStorage.setItem('travel_stores', JSON.stringify(stores)); }

function getStore(id) { return stores.find(s => s.id === id); }

function renderHome() {
  const list = document.getElementById('store-list');
  list.innerHTML = stores.map(s => {
    const bought = s.items.filter(i => i.bought).length;
    const total = s.items.length;
    const countColor = bought === total && total > 0 ? '#4a90d9' : bought > 0 ? '#f5a623' : '#1a2744';
    return `<div class="store-card" onclick="openStore('${s.id}')">
      <div class="store-icon" style="background:${s.color}">${s.icon}</div>
      <div class="store-info">
        <div class="store-name">${s.name}</div>
        ${s.sub ? `<div class="store-sub">${s.sub}</div>` : ''}
      </div>
      <div class="store-progress">
        <div class="store-count" style="color:${countColor}">${bought}/${total}</div>
        <div class="store-label">已購買</div>
      </div>
      <div class="store-actions" onclick="event.stopPropagation()">
        <button class="icon-btn" onclick="openEditStore('${s.id}')">✏️</button>
        <button class="icon-btn" onclick="deleteStore('${s.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function openStore(id) {
  currentStoreId = id;
  const s = getStore(id);
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  renderDetail();
}

function goHome() {
  document.getElementById('home-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  renderHome();
}

function renderDetail() {
  const s = getStore(currentStoreId);
  if (!s) return;
  const bought = s.items.filter(i => i.bought).length;
  const total = s.items.length;
  document.getElementById('detail-title').textContent = s.icon + ' ' + s.name;
  document.getElementById('detail-sub').textContent = (s.sub || '') + '　' + bought + '/' + total;
  const pct = total > 0 ? Math.round(bought / total * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';

  const grid = document.getElementById('items-grid');
  grid.innerHTML = s.items.map(item => {
    const priceStr = item.price ? `${item.price} ${item.currency || ''}` : '';
    return `<div class="item-card ${item.bought ? 'bought' : ''}" id="icard-${item.id}">
      <div class="item-img-wrap">
        ${item.img ? `<img src="${item.img}" alt="${item.name}">` : '<div class="item-img-placeholder">🛍️</div>'}
        <div class="bought-overlay">✓</div>
        <div class="item-edit-btns">
          <button class="item-edit-btn" onclick="openEditItem('${item.id}')">✏️</button>
          <button class="item-edit-btn" onclick="deleteItem('${item.id}')">🗑️</button>
        </div>
      </div>
      <div class="item-body">
        <div class="item-name">${item.name}</div>
        ${priceStr ? `<div class="item-price">${priceStr}</div>` : ''}
        <button class="buy-btn" onclick="toggleBought('${item.id}')">
          ${item.bought ? '✓ 已購買' : '標記已購買'}
        </button>
      </div>
    </div>`;
  }).join('');

  grid.innerHTML += `<div class="add-item-card" onclick="openAddItem()">
    <span style="font-size:30px;">＋</span>
  </div>`;
}

function toggleBought(itemId) {
  const s = getStore(currentStoreId);
  const item = s.items.find(i => i.id === itemId);
  if (item) { item.bought = !item.bought; save(); renderDetail(); }
}

function deleteItem(itemId) {
  if (!confirm('確定刪除此品項？')) return;
  const s = getStore(currentStoreId);
  s.items = s.items.filter(i => i.id !== itemId);
  save(); renderDetail();
}

function resetStore() {
  if (!confirm('重置所有品項的購買狀態？')) return;
  const s = getStore(currentStoreId);
  s.items.forEach(i => i.bought = false);
  save(); renderDetail();
}

function deleteStore(id) {
  if (!confirm('確定刪除此商店？')) return;
  stores = stores.filter(s => s.id !== id);
  save(); renderHome();
}

// ICON & COLOR PICKERS
function buildIconGrid(selectedVal) {
  return ICONS.map(ic => `<div class="icon-opt${ic===selectedVal?' selected':''}" onclick="selectIcon('${ic}',this)">${ic}</div>`).join('');
}
function buildColorGrid(selectedVal) {
  return COLORS.map(c => `<div class="color-opt${c===selectedVal?' selected':''}" style="background:${c}" onclick="selectColor('${c}',this)"></div>`).join('');
}
function selectIcon(ic, el) {
  selectedIcon = ic;
  document.querySelectorAll('#icon-grid .icon-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}
function selectColor(c, el) {
  selectedColor = c;
  document.querySelectorAll('#color-grid .color-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

// ADD STORE
function openAddStore() {
  editingStoreId = null;
  selectedIcon = ICONS[0]; selectedColor = COLORS[0];
  document.getElementById('store-name-inp').value = '';
  document.getElementById('store-sub-inp').value = '';
  document.getElementById('icon-grid').innerHTML = buildIconGrid(selectedIcon);
  document.getElementById('color-grid').innerHTML = buildColorGrid(selectedColor);
  document.getElementById('modal-store-title').textContent = '新增商店';
  openModal('modal-store');
}

function openEditStore(id) {
  editingStoreId = id;
  const s = getStore(id);
  selectedIcon = s.icon; selectedColor = s.color;
  document.getElementById('store-name-inp').value = s.name;
  document.getElementById('store-sub-inp').value = s.sub || '';
  document.getElementById('icon-grid').innerHTML = buildIconGrid(selectedIcon);
  document.getElementById('color-grid').innerHTML = buildColorGrid(selectedColor);
  document.getElementById('modal-store-title').textContent = '編輯商店';
  openModal('modal-store');
}

function saveStore() {
  const name = document.getElementById('store-name-inp').value.trim();
  if (!name) { alert('請輸入商店名稱'); return; }
  const sub = document.getElementById('store-sub-inp').value.trim();
  if (editingStoreId) {
    const s = getStore(editingStoreId);
    s.name = name; s.sub = sub; s.icon = selectedIcon; s.color = selectedColor;
  } else {
    stores.push({ id: Date.now().toString(), name, sub, icon: selectedIcon, color: selectedColor, items: [] });
  }
  save(); closeModal('modal-store'); renderHome();
}

// RENAME
function renameStore() {
  const s = getStore(currentStoreId);
  document.getElementById('rename-name-inp').value = s.name;
  document.getElementById('rename-sub-inp').value = s.sub || '';
  openModal('modal-rename');
}
function doRename() {
  const s = getStore(currentStoreId);
  const name = document.getElementById('rename-name-inp').value.trim();
  if (!name) return;
  s.name = name; s.sub = document.getElementById('rename-sub-inp').value.trim();
  save(); closeModal('modal-rename'); renderDetail();
}

// ADD ITEM
function openAddItem() {
  newItemImg = null;
  document.getElementById('item-name-inp').value = '';
  document.getElementById('item-price-inp').value = '';
  document.getElementById('item-currency-inp').value = '日圓';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('img-inp').value = '';
  openModal('modal-item');
}
function handleImg(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    newItemImg = ev.target.result;
    const prev = document.getElementById('img-preview');
    prev.src = newItemImg; prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
}
function saveItem() {
  const name = document.getElementById('item-name-inp').value.trim();
  if (!name) { alert('請輸入品項名稱'); return; }
  const price = document.getElementById('item-price-inp').value;
  const currency = document.getElementById('item-currency-inp').value;
  const s = getStore(currentStoreId);
  s.items.push({ id: Date.now().toString(), name, price, currency, img: newItemImg, bought: false });
  save(); closeModal('modal-item'); renderDetail();
}

// EDIT ITEM
function openEditItem(itemId) {
  const s = getStore(currentStoreId);
  const item = s.items.find(i => i.id === itemId);
  editingItemId = itemId;
  editItemImg = item.img || null;
  document.getElementById('edit-item-name-inp').value = item.name;
  document.getElementById('edit-item-price-inp').value = item.price || '';
  document.getElementById('edit-item-currency-inp').value = item.currency || '日圓';
  const prev = document.getElementById('edit-img-preview');
  if (item.img) { prev.src = item.img; prev.style.display = 'block'; }
  else { prev.style.display = 'none'; }
  document.getElementById('edit-img-inp').value = '';
  openModal('modal-edit-item');
}
function handleEditImg(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    editItemImg = ev.target.result;
    const prev = document.getElementById('edit-img-preview');
    prev.src = editItemImg; prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
}
function saveEditItem() {
  const name = document.getElementById('edit-item-name-inp').value.trim();
  if (!name) return;
  const s = getStore(currentStoreId);
  const item = s.items.find(i => i.id === editingItemId);
  item.name = name;
  item.price = document.getElementById('edit-item-price-inp').value;
  item.currency = document.getElementById('edit-item-currency-inp').value;
  if (editItemImg) item.img = editItemImg;
  save(); closeModal('modal-edit-item'); renderDetail();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-bg').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

renderHome();
</script>
</body>
</html>
